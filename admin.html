<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#000000',
                        card: '#0a0a0a',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-background min-h-screen text-white p-4 md:p-10 font-sans">

    <!-- Login/Config Screen -->
    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-card p-8 rounded-3xl border border-white/[0.05]">
        <div class="text-center mb-8">
            <i data-lucide="layout-dashboard" class="w-12 h-12 text-blue-500 mx-auto mb-4"></i>
            <h1 class="text-2xl font-black">Admin Setup</h1>
            <p class="text-zinc-500 text-sm mt-2">Enter your Supabase details to connect</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-zinc-500 uppercase">Supabase URL</label>
                <input type="text" id="supa-url" class="w-full bg-black border border-white/[0.05] rounded-xl p-3 mt-1 outline-none focus:border-blue-500" placeholder="https://xyz.supabase.co">
            </div>
            <div>
                <label class="text-xs font-bold text-zinc-500 uppercase">Supabase Anon Key</label>
                <input type="password" id="supa-key" class="w-full bg-black border border-white/[0.05] rounded-xl p-3 mt-1 outline-none focus:border-blue-500" placeholder="eyJh...">
            </div>
            <button onclick="connectSupabase()" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl transition-all">Connect</button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="hidden max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-8 pb-4 border-b border-white/[0.05]">
            <div class="flex items-center gap-3">
                <i data-lucide="layout-dashboard" class="text-blue-500"></i>
                <h1 class="text-2xl font-black">Command Center</h1>
            </div>
            <button onclick="saveData()" class="bg-blue-500 hover:bg-blue-600 px-6 py-2 rounded-xl font-bold flex items-center gap-2 transition-all">
                <i data-lucide="save" class="w-4 h-4"></i> Save Changes
            </button>
        </header>

        <!-- Status Toast -->
        <div id="toast" class="hidden mb-6 p-4 rounded-xl border font-bold text-sm"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Profile -->
            <div class="bg-card p-6 rounded-3xl border border-white/[0.05]">
                <h2 class="text-lg font-bold mb-4 border-b border-white/[0.05] pb-2">Profile</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">Name</label>
                        <input type="text" id="input-name" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">Role</label>
                        <input type="text" id="input-role" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">Bio</label>
                        <textarea id="input-bio" rows="4" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1"></textarea>
                    </div>
                </div>
            </div>

            <!-- Socials -->
            <div class="bg-card p-6 rounded-3xl border border-white/[0.05]">
                <h2 class="text-lg font-bold mb-4 border-b border-white/[0.05] pb-2">Social Links</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">GitHub</label>
                        <input type="text" id="input-github" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">LinkedIn</label>
                        <input type="text" id="input-linkedin" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1">
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 uppercase">Binance ID</label>
                        <input type="text" id="input-binance" class="w-full bg-black border border-white/[0.05] rounded-lg p-2 mt-1">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
